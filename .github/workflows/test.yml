name: Tests

on:
  pull_request:
    paths:
      - 'ingestion/**'
      - '.github/workflows/test.yml'
  push:
    branches: [main]
    paths:
      - 'ingestion/**'
      - '.github/workflows/test.yml'

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run tests
        run: pytest -q ingestion/tests
